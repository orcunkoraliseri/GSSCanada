# F9a.yaml — F8 + AUX_STRATUM_LAMBDA=0.02 (mechanism-level test)
# Hypothesis: lambda=0.1 makes decoder encode stratum too aggressively, causing
# representation distortion that bleeds into Spouse and act_JS (both regressed in F8).
# Reducing lambda preserves AT_HOME benefit (+1.41 pp) while damping over-encoding.
# Hard gates: composite < 1.045, AT_HOME <= +5.3 pp, Spouse <= +10 pp, act_JS <= 0.05
tag: F9a
seed: 42

# Argparse flags (fp32 — no fp16)
data_dir: outputs_step4
batch_size: 256
max_epochs: 100
patience: 15
lr: 5.0e-5
d_model: 256
n_heads: 8
n_enc_layers: 6
n_dec_layers: 6

# Loss weights (F8/F1 defaults)
lambda_act: 1.0
lambda_home: 0.5
lambda_cop: 0.3
lambda_marg: 0.1
marg_mode: global

# Feature switches: F8 base + reduced aux lambda
aux_stratum_head: 1
aux_stratum_lambda: 0.02
spouse_neg_weight: 1.0
cop_pos_weight: 0
activity_boosts: 1
data_side_sampling: 0
