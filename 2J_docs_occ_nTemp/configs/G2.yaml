# G2.yaml — G-series stage 2: Scheduled sampling + label smoothing (H3 fix)
# Derived from G1.yaml. Same data_dir (G1 proportional pairs carried forward).
# New env vars: SCHED_SAMPLE_P=0.2, HOME_LABEL_SMOOTH=0.05
# Setting both to 0.0 reproduces G1 behaviour exactly.
# Hard gates (G-series): composite < 1.045 | AT_HOME <= +5.3 pp | Spouse <= +5 pp | act_JS <= 0.05
tag: G2
seed: 42

# Argparse flags (fp32, same as G1/F10a)
data_dir: outputs_step4_G1
batch_size: 256
max_epochs: 100
patience: 15
lr: 5.0e-5
d_model: 256
n_heads: 8
n_enc_layers: 6
n_dec_layers: 6

# Loss weights (F10a base — unchanged)
lambda_act: 1.0
lambda_home: 0.5
lambda_cop: 0.3
lambda_marg: 0.1
marg_mode: global

# Feature switches (F10a base — unchanged)
aux_stratum_head: 1
aux_stratum_lambda: 0.1
spouse_neg_weight: 0.45
cop_pos_weight: 0
activity_boosts: 1
data_side_sampling: 0

# G2: H3 interventions
sched_sample_p: 0.2
home_label_smooth: 0.05
